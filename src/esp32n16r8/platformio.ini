[env:esp32-s3-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; 1. MCU 및 클럭 주파수 설정
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L

; 2. N16R8 전용 메모리 구성 (Flash: QIO, PSRAM: OPI)
; N16R8은 보통 Flash가 Quad SPI, PSRAM이 Octal SPI인 'qio_opi' 형식을 사용합니다.
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB

; 3. 16MB 전체를 활용하기 위한 파티션 테이블 설정
; 기본 4MB 설정을 넘어서 16MB를 앱 저장소 및 파일시스템으로 분할합니다.
board_build.partitions = default_16MB.csv

; 4. 필수 빌드 플래그
build_flags = 
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1 ; 내장 USB 포트를 시리얼 모니터로 사용 (중요)
    -DCORE_DEBUG_LEVEL=3       ; 디버그 메시지 출력 레벨 (0~5)

; 5. 모니터링 및 업로드 속도
monitor_speed = 115200
upload_speed = 921600

; 6. 라이브러리 의존성 (앞서 테스트한 WS2812 포함)
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.15.4